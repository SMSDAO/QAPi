name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build-core:
    name: Build core-brain lib
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
      - name: Verify build artifacts
        run: |
          test -f dist/tier-manager.cjs && \
          test -f dist/module-resolver.cjs && \
          echo "core-brain artifacts OK"
      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-brain-dist
          path: apps/core/dist/

  test-api:
    name: API Tests (Node ${{ matrix.node }})
    needs: build-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - name: Download core-brain dist
        uses: actions/download-artifact@v4
        with:
          name: core-brain-dist
          path: apps/core/dist/
      - name: Install API dependencies
        run: cd api && npm ci
      - name: Run API tests
        run: cd api && npm test
      - name: Security audit (API)
        run: cd api && npm audit --audit-level=high

  test-sdk:
    name: SDK Tests (Node ${{ matrix.node }})
    needs: build-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json
      - name: Download core-brain dist
        uses: actions/download-artifact@v4
        with:
          name: core-brain-dist
          path: apps/core/dist/
      - name: Install API dependencies (SDK tests start the API server)
        run: cd api && npm ci
      - name: Run SDK tests
        run: cd sdk && npm test
      - name: Security audit (SDK)
        run: cd sdk && npm audit --audit-level=high

  test-core:
    name: Core Brain Tests (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck

  build-sdk:
    name: SDK Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - name: Verify build artifacts
        run: test -f dist/index.cjs && test -f dist/index.mjs && echo "Build artifacts OK"

  validate-schema:
    name: Validate module-node.schema.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check schema is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('module-node.schema.json','utf8')); console.log('Schema OK');"
